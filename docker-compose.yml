services:
  postgres:
    image: postgres:16-alpine
    container_name: umrabor_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: umrabor
      POSTGRES_USER: umrabor
      POSTGRES_PASSWORD: umrabor_dev_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umrabor -d umrabor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: umrabor_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: umrabor_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb -p local/umrabor-uploads || true;
      mc mb -p local/umrabor-vouchers || true;
      mc anonymous set download local/umrabor-uploads || true;
      exit 0;
      "

volumes:
  pg_data:
  redis_data:
  minio_data:
