# UMRABOR — production nginx (umrabor.uz + поддомены)
# certbot управляет SSL: certbot --nginx -d umrabor.uz -d admin.umrabor.uz -d partner.umrabor.uz -d miniapp.umrabor.uz -d api.umrabor.uz

# ─────── публичный сайт ───────
server {
    listen 80;
    server_name umrabor.uz www.umrabor.uz;
    return 301 https://umrabor.uz$request_uri;
}

server {
    listen 443 ssl http2;
    server_name umrabor.uz;

    # ssl_certificate, ssl_certificate_key — добавит certbot

    client_max_body_size 25M;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─────── АРМ Платформы ───────
server {
    listen 443 ssl http2;
    server_name admin.umrabor.uz;

    location / {
        proxy_pass http://127.0.0.1:3001;
        include /etc/nginx/snippets/umrabor-proxy.conf;
    }
}

# ─────── АРМ Партнёра ───────
server {
    listen 443 ssl http2;
    server_name partner.umrabor.uz;

    location / {
        proxy_pass http://127.0.0.1:3002;
        include /etc/nginx/snippets/umrabor-proxy.conf;
    }
}

# ─────── Mini App ───────
server {
    listen 443 ssl http2;
    server_name miniapp.umrabor.uz;

    root /var/www/umrabor/miniapp;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ─────── API ───────
server {
    listen 443 ssl http2;
    server_name api.umrabor.uz;

    client_max_body_size 25M;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
