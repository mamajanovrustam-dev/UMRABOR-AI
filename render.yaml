# Render.com Blueprint для UMRABOR backend + PostgreSQL.
# Render автоматически создаст web-сервис и БД по этому файлу.
# Регистрация → New → Blueprint → подключить репо → Apply.

databases:
  - name: umrabor-db
    plan: free
    databaseName: umrabor
    user: umrabor
    region: frankfurt

services:
  - type: web
    name: umrabor-api
    runtime: docker
    repo: https://github.com/mamajanovrustam-dev/UMRABOR-AI
    plan: free
    region: frankfurt
    branch: claude/umrachi-YZR5K
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: ./services/api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENV
        value: staging
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: umrabor-db
          property: connectionString
      - key: REDIS_URL
        value: "redis://localhost:6379/0"
      - key: S3_ENDPOINT
        value: "https://s3.example.com"
      - key: S3_ACCESS_KEY
        value: "test"
      - key: S3_SECRET_KEY
        value: "test-secret"
      - key: S3_PUBLIC_URL
        value: "https://s3.example.com"
      - key: CLICK_MODE
        value: mock
      - key: SMS_PROVIDER
        value: mock
      - key: CORS_ORIGINS
        value: "https://umrabor-web.vercel.app,https://umrabor-platform.vercel.app,https://umrabor-partner.vercel.app,https://umrabor-miniapp.vercel.app,http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003"
