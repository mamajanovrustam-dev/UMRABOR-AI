  {"i":"АРМ Партнёра","c":"Заявки","q":"Что в диалоге отклонения заявки?","a":"Modal «Отклонить заявку UM-XXXX» с 4 чекбоксами причин: <b>Нет возможности разместить</b> (места закончились или пол не совпадает), <b>Нет документов</b> (паспорт не загружен или просрочен), <b>Информация неверна</b> (ошибки в ФИО, серии/номере), <b>Другое</b> (раскрывает textarea). Подсказка: клиент получит уведомление + возврат в 1-3 дня."},
  {"i":"АРМ Партнёра","c":"Чат","q":"Что показывает раздел Чат?","a":"Заголовок «Чат с клиентами», подпись «SLA на ответ — 15 минут». Слева — список активных чатов (бейдж 3 — Рустам Мамажонов с 2 unread, Сардор Раҳимов с 1, Гулнора Холматова с 1, Бахтиёр Юсупов). Справа — сам чат: имя клиента + статус Онлайн + ID заявки + статус заявки + кнопка «📋 Буюртма». Сообщения с метками ✓✓, input с 📎 и ➤."},
  {"i":"АРМ Партнёра","c":"Пакеты","q":"Сколько пакетов у партнёра?","a":"Шесть. Фильтры: <b>Барчаси (6) · Активные (5) · Черновики (1) · Архив (0)</b>. Конкретно: Премиум Баҳор · Рамазон Люкс 2026 · Эконом пакет · Стандарт пакет · Премиум 3 шаҳар (все Активные) + Лайт Умра (Черновик)."},
  {"i":"АРМ Партнёра","c":"Пакеты","q":"Что в карточке пакета?","a":"Фото + название + бейдж тира + статус. Города (Жидда 1·Мадина 4·Макка 8), цены DBL/TRPL/QUAD (23,4/19,5/17,2 М), количество вылетов, статистика (продано/свободно/% заполнения), доход, ближайший вылет (например 22.06.2026 · через 35 дней · 32 жой)."},
  {"i":"АРМ Партнёра","c":"Мастер публикации","q":"Сколько шагов в мастере публикации пакета?","a":"Четыре: <b>1. Параметры · 2. Вылеты · 3. Инвентарь · 4. Подтверждение</b>. Stepper сверху, навигация Кейинги/Назад."},
  {"i":"АРМ Партнёра","c":"Мастер публикации","q":"Что заполняется на шаге 1 «Параметры»?","a":"Поля: <b>Номи</b>, <b>Тир</b> (Eco/Standard/Premium/Lux/Premium+), <b>Описание</b>. Фотографии (грид с обложкой). <b>Маршрут</b> — 4 строки остановок (Жидда/Мадина/Макка), для каждой: ночей, гостиница (Movenpick/Hayah/Hilton/Anjum/Ramada/Dar Al-Iman), трансфер (Автобус/Haramain поезд). <b>Питание</b> отдельно на каждую гостиницу (бесплатное + платное). <b>Услуги</b> 9 чекбоксов (Виза/Haramain/Автобус/Гид-имом/Страховка/Зам-зам/Сумка/Мобильный/Сертификат). <b>Подарки</b> 6 (Эко-сумка/Наушники/Плед/Чётки/Сувенир/Дуа китоби)."},
  {"i":"АРМ Партнёра","c":"Мастер публикации","q":"Что на шаге 2 «Вылеты»?","a":"Список вылетов карточками: дата туда + день недели · дата обратно · авиа·рейс (QR-2113/2114) · самолёт (Boeing 787-9) · багаж. Кнопка <b>«+ Янги вылет»</b> открывает диалог с 2 блоками (Туда/Обратно), в каждом 9 полей: дата · город вылета · город прилёта · авиакомпания (custom dropdown с логотипами QR/HY/FZ/SV/TK) · время · продолжительность ч+мин · номер рейса · багаж · ручная кладь."},
  {"i":"АРМ Партнёра","c":"Мастер публикации","q":"Что на шаге 3 «Инвентарь»?","a":"Info-блок тура (название/тир/авиа/гостиницы) + поля <b>Тарифов /чел</b> (DBL 23 400 000, TRPL 19 500 000, QUAD 17 200 000). Чипы вылетов. Таблица «Вариация / Буш жой / Хоналар (stepper) / Жами жой / Потенциал» — список 8 строк (DBL, TRPL, QUAD, DBL M, DBL F, TRPL M, TRPL F, QUAD M). Итого по вылету: 9 хона · 27 буш жой · 522,3 млн."},
  {"i":"АРМ Партнёра","c":"Мастер публикации","q":"Что на шаге 4 «Подтверждение»?","a":"Финальная сводка перед публикацией. Секция 1 — все параметры (название, тир, маршрут с 4 stop-chip, услуги, подарки, питание по гостиницам). Секция 2 — <b>таблица вылетов и инвентаря</b> (3 даты · 81 место): для каждого вылета даты+день недели+время, авиа QR-2113/2114, цены DBL/TRPL/QUAD, инвентарь по типам. Итого по пакету: 30 хона · 81 мест · 1,57 млрд. Тёмно-синий баннер «После публикации станет доступен клиентам в мини-аппе Click». Кнопка <b>📤 Опубликовать</b>."},
  {"i":"АРМ Партнёра","c":"Остатки","q":"Что в разделе Остатки?","a":"Селектор пакета (6 карточек, активна Премиум Баҳор). Поля тарифов (DBL/TRPL/QUAD). Чипы вылетов (4 даты). Таблица 8 вариаций с stepper'ами для редактирования количества номеров. Итого: 14 хона · 32 буш жой · 644,4 млн. Кнопка <b>«+ Янги вариант»</b> добавляет новый тип номера."},
  {"i":"АРМ Партнёра","c":"Размещения","q":"Что в разделе Размещения?","a":"Селектор пакета (Премиум 3 шаҳар активна). Multi-dropdown фильтры по вылету и типу. KPI: <b>Размещено 19 из 24, Комнат 8/11, Мужчин 12 (63%), Женщин 7 (37%), Доход 438,8 М</b>. Список 8 комнат с типом (DBL FM, SINGLE, TRPL FM, QUAD FM, DBL M 1/2 ждёт мужчину), составом зиёратчилар (с махрам), ID заявки и суммой."},
  {"i":"АРМ Партнёра","c":"Зиератчилар","q":"Что в разделе Зиератчилар?","a":"Таблица всех 184 паломников. Фильтры: Пакет / Вылет / Пол / Размещение / Сертификат + поиск + чипы Загранпасорт (Все 17 · ✓ Есть 13 · ⚠ Нет 4). Колонки: ФИО / Пол / Пакет·Вылет / Заявка / Загранпасорт / Туғилган / Размещение / Сертификат. Например: Сардор Раҳимов · Эркак · Премиум 3 шаҳар · UM-2026-0061 · AA1234567 до 12.30 · 15.06.1985 · DBL FM."},
  {"i":"АРМ Партнёра","c":"Зиератчилар","q":"Что в карточке паломника?","a":"Hero с аватаром (с загрузкой фото), полное имя, теги (Эркак/⭐ Маҳрам/VIP), мета (туғилган, возраст, гражданство, город, клиент с). 4 KPI: Всего поездок 3 · Сумма потрачено 187,5 М · Последняя поездка · Взаимодействий 12. Слева стек: <b>📞 Контакты</b> (телефон Beeline, доп.номер, Telegram, email), <b>📄 Документы</b> (Загран + ID + маҳрам-связи). Справа: <b>💬 Журнал взаимодействий</b> (12 записей с табами Все/Встреча/Звонок/Telegram + форма добавления). Внизу: <b>✈ История поездок</b> (3 поездки)."},
  {"i":"АРМ Партнёра","c":"Справочники","q":"Какие справочники есть?","a":"Восемь табов: <b>🏨 Отели (14) · ✈️ Авиакомпании (6) · 🛡 Услуги (9) · 🎁 Подарки (6) · 🍽 Типы питания (5) · 🏷 Тип пакета (3) · 🚌 Тип трансфера (4) · ⛔ Причины отказа (4)</b>."},
  {"i":"АРМ Партнёра","c":"Справочники","q":"Какие отели в справочнике?","a":"Шесть: <b>Hayah Madinah ★★★★★</b> (Мадина · 250м до Набавий · в 3 пакетах), <b>Ramada Al Qasr ★★★★★</b> (Макка · 800м до Аль-Ҳарам · в 3), <b>Movenpick Madinah ★★★★★</b> (Мадина · 150м · в 2), <b>Hilton Suites Makkah ★★★★★</b> (Макка · 500м · в 2), <b>Anjum Hotel ★★★★</b> (Макка · 200м · в 1), <b>Dar Al-Iman ★★★★</b> (Мадина · 50м · в 1)."},
  {"i":"АРМ Партнёра","c":"Справочники","q":"Какие авиакомпании?","a":"Пять: <b>HY UZAIRWAYS</b> (Ташкент TAS, в 5 пакетах), <b>QR Qatar Airways</b> (Доха DOH, в 2), <b>FZ FlyDubai</b> (Дубай DXB, в 2), <b>SV Saudia</b> (Жидда JED, в 2), <b>TK Turkish Airlines</b> (Стамбул IST, в 1)."},
  {"i":"АРМ Партнёра","c":"Справочники","q":"Какие причины отказа?","a":"Четыре: <b>Нет возможности разместить</b> (12 заявок), <b>Нет документов</b> (8), <b>Информация неверна</b> (5), <b>Другое</b> (3 — свободная формулировка)."},
  {"i":"АРМ Партнёра","c":"Команда","q":"Кто в команде Ramaz Travel?","a":"Пять пользователей: <b>Анвар Қурбонов</b> (Админ, сейчас онлайн), <b>Дилфуза Турсунова</b> (Оператор), <b>Шерали Алиев</b> (Админ), <b>Малика Бакаева</b> (Оператор), <b>Умид Бабаев</b> (Оператор, отключён). Итого: 5 пользователей · 4 активны · 1 отключён."},
  {"i":"АРМ Партнёра","c":"Команда","q":"Чем Админ отличается от Оператора?","a":"Админ — полный доступ ко всем разделам, создаёт пакеты и пользователей, ведёт справочники. Оператор — принимает/отклоняет заявки, ведёт чат, корректирует остатки, видит размещения/паломников/пакеты (просмотр). Оператор <b>не видит</b> Справочники, Команду, Историю, Профиль, Настройки. Список ролей фиксированный."},
  {"i":"АРМ Партнёра","c":"Команда","q":"Что в матрице прав?","a":"13 разделов × 2 роли с toggle. Дашборд / Заявки / Чат / Пакеты-просмотр / Остатки / Размещения / Зиератчилар — оба ВКЛ. Профиль / Пакеты-публикация / Справочники / Команда / История / Настройки — только Админ."},
  {"i":"АРМ Партнёра","c":"Настройки","q":"Что в Настройках?","a":"Три секции: <b>1. 🔐 Управление ролями</b> (2 роли + матрица прав 13×2), <b>2. 🔔 Уведомления</b> (7 триггеров × Push/SMS), <b>3. 📦 Инвентарь</b> (16 типов размещения вкл/выкл)."},
  {"i":"АРМ Партнёра","c":"Настройки","q":"Какие триггеры уведомлений?","a":"Семь: <b>🆕 Новая заявка · ✓ Заявка принята · ✕ Заявка отклонена · ⏱ СЛА на грани · ✉ Новое письмо · 📉 Остатки на грани (1 жой) · 📦 Инвентарь закончился (0 жой)</b>. Канал Push доступен, SMS — «скоро»."},
  {"i":"АРМ Партнёра","c":"Настройки","q":"Сколько типов размещения в Инвентаре?","a":"16 фиксированных вариантов: <b>SINGLE · DBL FM · DBL M · DBL F · TRPL FM · TRPL M1 · TRPL M2 · TRPL F1 · TRPL F2 · QUAD FM · QUAD M1 · QUAD M2 · QUAD M3 · QUAD F1 · QUAD F2 · QUAD F3</b>. По умолчанию 10 ВКЛ, 6 ВЫКЛ (TRPL F1, TRPL F2, QUAD M2, QUAD M3, QUAD F2, QUAD F3). Новые добавлять нельзя."},
  {"i":"АРМ Партнёра","c":"Профиль партнёра","q":"Что в Профиле партнёра?","a":"Пять секций: <b>1. 🏢 Основное</b> (логотип, название, бренд-slug, город, год основания, паломников отправлено), <b>2. 📷 Фото витрины</b> (3 фото для Click и сайта), <b>3. 📝 Описание</b> (для клиентов), <b>4. 📜 Лицензия</b> (номер, орган, даты, скан PDF), <b>5. 🏦 Контрагент</b> (юр.название, ИНН, ОКЭД, счёт, банк, МФО, адреса, директор, контакты)."},
  {"i":"АРМ Партнёра","c":"История","q":"Какие действия логируются?","a":"Аудит-лог всех действий сотрудников и системы. Примеры: <b>✓ Подтвердил заявку, 📄 Загрузил паспорт, ✕ Отклонил заявку, ✎ Изменил пакет, 💰 Зарегистрировал платёж, 🆕 Создал заявку (Click webhook), 🔐 Вход в систему (с IP+браузером), 📤 Опубликовал пакет, 🛏 Изменил размещение, 📷 Загрузил фото пакета</b>. Показано 15 из 1247 записей за 7 дней."},

  {"i":"Клиент Mini App","c":"Навигация","q":"Какие пункты в нижнем меню?","a":"Четыре: <b>🏠 Бош саҳифа · ▦ Каталог · 🛍 Буюртмалар · 👤 Профиль</b>. Активный — зелёным."},
  {"i":"Клиент Mini App","c":"Бош саҳифа","q":"Что на главной?","a":"8 блоков сверху вниз: <b>Hero</b> (фон с мечетью + заголовок «Умра сафари сиз кутган сифатда» + 3 чек-листа ✓), <b>Поиск</b> (Кетиш сана + Келиш сана + кнопка 🔍 Излаш), <b>Тавсия қилинганлар</b> (1 карточка Премиум 3 шаҳар), <b>Турлардан видеолар</b> (5 reels), <b>Нега UMRABOR?</b> (6 пунктов), <b>Қандай сотиб олинади</b> (4 шага), <b>Фотогалерея</b> (4 фото), <b>Партнёрский блок</b> (форма для тур-операторов)."},
  {"i":"Клиент Mini App","c":"Бош саҳифа","q":"Какой текст в hero?","a":"Заголовок: <b>«Умра сафари сиз кутган сифатда»</b> (слово «Умра сафари» — золотым). Чек-лист 3 пункта: Ишончли агентликлар · Шаффоф нархлар · Click орқали тўлов."},
  {"i":"Клиент Mini App","c":"Бош саҳифа","q":"Что в блоке «Нега UMRABOR?» в мини-аппе?","a":"Шесть карточек: <b>Лицензияланган операторлар</b>, <b>24/7 қўллаб-қувватлаш</b>, <b>Тажрибали гид</b> (ўзбек тилида биладиган имом), <b>Шаффоф нархлар</b>, <b>Маҳрам бўйича танлов</b>, <b>Click орқали тез тўлов</b>."},
  {"i":"Клиент Mini App","c":"Бош саҳифа","q":"Какие шаги «Қандай сотиб олинади»?","a":"Четыре: <b>1. Пакет танланг 📅 · 2. Зиератчиларни қўшинг 👥 · 3. Click орқали тўланг 💳 · 4. Сафарга чиқинг 🕌</b>."},
  {"i":"Клиент Mini App","c":"Каталог","q":"Какие пакеты в каталоге мини-аппа?","a":"Пять пакетов: <b>Премиум 3 шаҳар</b> (Ramaz Travel, Premium, дан 17,2 М), <b>Рамазон Люкс 2026</b> (RT, Lux, дан 19,5 М), <b>Эконом пакет</b> (RT, Eco, дан 11,8 М), <b>Стандарт пакет</b> (Safar Tours · Самарқанд, Standard, дан 14,5 М), <b>Премиум Баҳор VIP</b> (Barakah VIP · Тошкент, Premium+, дан 22,8 М). Фильтр месяцев: Барчаси · Ноябрь...Июль."},
  {"i":"Клиент Mini App","c":"Каталог","q":"Что показывается в карточке пакета каталога?","a":"Tier-badge (Premium/Lux/Eco/Standard/Premium+) и цена «дан N М» сверху на фото. Имя пакета. Партнёр с логотипом и городом. <b>Мадина</b>: отель + ★★★★★ + расстояние до Набавий. <b>Макка</b>: отель + расстояние до Ҳарама. Рейсы туда → обратно с авиакомпаниями. Цены 4 строки: 1 кишилик / 2 кишилик / 3 кишилик / 4 кишилик."},
  {"i":"Клиент Mini App","c":"Страница пакета","q":"Что в детальной странице пакета?","a":"Галерея 4 фото (1/4 с точками). Заголовок «Премиум 3 шаҳар» + badge «12 кун». Блоки: <b>Тавсиф</b> (описание), <b>Меҳмонхона</b> (Мадина Hayah ★★★★☆ 7 кеча + Макка Ramada Al Qasr ★★★★★ 3 кеча с зол./зел. pill расстояния и питания), <b>Сафар йўналиши</b> (timeline из 7 точек), <b>Хизматлар</b> (6 пунктов с ✓✓), <b>Совғалар</b> (3 пункта), <b>Нархлар</b> (4 цены). Sticky CTA <b>«Сотиб олиш ›»</b>."},
  {"i":"Клиент Mini App","c":"Страница пакета","q":"Какие шаги в Сафар йўналиши?","a":"Семь точек таймлайна: <b>1) Жидда — Учиб келиш ✈️ · 2) Жидда → Мадина — Трансфер автобус 🚌 · 3) Мадина — Hayah pill «3 кун» 🕌 · 4) Мадина → Макка — Трансфер тезюрар поезд 🚄 · 5) Макка — Ramada Al Qasr pill «7 кун» · 6) Макка → Жидда — Трансфер автобус · 7) Жидда → Тошкент — Учиб кетиш</b>."},
  {"i":"Клиент Mini App","c":"Бронирование","q":"Сколько шагов в бронировании?","a":"Четыре экрана: <b>1. Зиёратчилар руйхати</b> (кто едет) → <b>2. Кунни танлаш</b> (выбор вылета) → <b>3. Жойлашув</b> (тип размещения) → <b>4. Тўлов</b> (оплата)."},
  {"i":"Клиент Mini App","c":"Бронирование","q":"Что в шаге 1 «Зиёратчилар руйхати»?","a":"Empty state: большая иконка людей + «Зиёратчилар рўйхати бўш» + текст + кнопка <b>«+ Зиёратчи қўшиш»</b>. После добавления — список карточек зиёратчилар (имя, теги пол/дата рождения/маҳрам/паспорт) + dashed-кнопка «+ Зиёратчи қўшиш». Зелёный hint «💡 Кейинги қадамда сизга мос Учиш кунлари ва нархлар кўрсатилади.»"},
  {"i":"Клиент Mini App","c":"Бронирование","q":"Какие поля при добавлении зиёратчи?","a":"Исм · Фамилия · Туғилган йил · Жинс (👨 Эркак/👩 Аёл). <b>Toggle «Загранпаспортим йўқ»</b>. Если есть: Загранпасорт серия/рақам + амал қилиш муддати. Если нет: зелёный info «💡 Биз сизга ёрдам берамиз. 15 кун ичида расмийлаштиришда ёрдам берамиз» + ID-Паспорт серия/рақам + муддати. Если меньше 15 дней — красный warn «❌ Танланган санага вақт етмайди»."},
  {"i":"Клиент Mini App","c":"Бронирование","q":"Когда появляется блок Маҳрам?","a":"Только если в группе уже есть другие зиёратчилар (со 2-го). Поля: <b>Кимга нисбатан маҳрам?</b> (select из существующих) + <b>Қандай алоқа?</b> (Эри/Аёли/Отаси/Онаси/Акаси/Укаси/Опаси/Синглиси/Ўғли/Қизи)."},

const ifaces = [...new Set(items.map(i => i.i))];

let activeIface = 'all';
let activeCat = 'all';

function chipColors(iface){ return ifaceColors[iface] || ['#fff','rgba(255,255,255,.05)','rgba(255,255,255,.15)']; }

function renderIfaces(){
  const total = items.length;
  let html = '<div class="iface-chip ' + (activeIface==='all'?'active':'') + '" onclick="selIface(\'all\')" style="' + (activeIface==='all'?'border-color:#fff;color:#fff;background:rgba(255,255,255,.05)':'') + '">Все интерфейсы<span class="cnt">' + total + '</span></div>';
  ifaces.forEach(iface => {
    const n = items.filter(it => it.i === iface).length;
    const [c, soft, line] = chipColors(iface);
    const isActive = activeIface === iface;
    const style = isActive ? 'border-color:' + line + ';background:' + soft + ';color:' + c : '';
    html += '<div class="iface-chip ' + (isActive?'active':'') + '" onclick="selIface(\'' + iface.replace(/'/g, "\\'") + '\')" style="' + style + '">' + iface + '<span class="cnt">' + n + '</span></div>';
  });
  document.getElementById('ifaces').innerHTML = html;
}

function renderCats(){
  const visible = items.filter(it => activeIface === 'all' || it.i === activeIface);
  const cats = [...new Set(visible.map(it => it.c))];
  let html = '<div class="cat-chip ' + (activeCat==='all'?'active':'') + '" onclick="selCat(\'all\')">Все разделы · ' + visible.length + '</div>';
  cats.forEach(c => {
    const n = visible.filter(it => it.c === c).length;
    html += '<div class="cat-chip ' + (activeCat===c?'active':'') + '" onclick="selCat(\'' + c.replace(/'/g, "\\'") + '\')">' + c + ' · ' + n + '</div>';
  });
  document.getElementById('cats').innerHTML = html;
}

  const filtered = items

  document.getElementById('count').innerHTML = '<b>' + filtered.length + '</b> / ' + items.length;
  if(filtered.length === 0){ document.getElementById('content').innerHTML = '<div class="empty">Ничего не найдено</div>'; return; }
  const byIface = {};
  filtered.forEach(it => { (byIface[it.i] = byIface[it.i] || {}); (byIface[it.i][it.c] = byIface[it.i][it.c] || []).push(it); });
  let html = '';
  ifaces.forEach(iface => {
    if(!byIface[iface]) return;
    const [c, soft, line] = chipColors(iface);
    html += '<div class="iface-block">';
    html += '<div class="iface-h" style="background:' + soft + ';border:1px solid ' + line + ';color:' + c + '">' + iface + '</div>';
    Object.keys(byIface[iface]).forEach(cat => {
      const list = byIface[iface][cat];
      html += '<div class="cat-group"><div class="cat-h">' + cat + '</div>';
      list.forEach(it => {
        const num = String(it.idx + 1).padStart(3, '0');
        html += '<div class="qa" data-i="' + it.idx + '" style="border-left-color:' + c + '"><div class="qa-q" onclick="toggle(' + it.idx + ')"><div class="num">' + num + '</div><div class="txt">' + it.q + '</div><div class="arr">▼</div></div><div class="qa-a"><div class="qa-a-in">' + it.a + '</div></div></div>';
      });
      html += '</div>';
    });
    html += '</div>';
  });
  document.getElementById('content').innerHTML = html;
}

function toggle(i){ const el = document.querySelector('.qa[data-i="' + i + '"]'); if(el) el.classList.toggle('open'); }
function selIface(iface){ activeIface = iface; activeCat = 'all'; renderIfaces(); renderCats(); render(); }
function selCat(cat){ activeCat = cat; renderCats(); render(); }
document.getElementById('search').addEventListener('input', e => { query = e.target.value; render(); });

renderIfaces();
renderCats();
render();
</script>
</body>
</html>
