name: API · tests & lint

on:
  push:
    branches: [main, develop, "claude/**"]
    paths:
      - "services/api/**"
      - ".github/workflows/api.yml"
  pull_request:
    paths:
      - "services/api/**"
      - ".github/workflows/api.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: umrabor
          POSTGRES_PASSWORD: umrabor_dev_pass
          POSTGRES_DB: umrabor_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/api/pyproject.toml

      - name: System deps (WeasyPrint)
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libcairo2 libgdk-pixbuf-2.0-0

      - name: Install
        working-directory: services/api
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        working-directory: services/api
        run: |
          ruff check .
          ruff format --check .

      - name: Test
        working-directory: services/api
        env:
          ENV: test
          SECRET_KEY: ci-test-secret-key-min-32-chars-long-xx
          DATABASE_URL: postgresql+asyncpg://umrabor:umrabor_dev_pass@localhost:5432/umrabor_test
          REDIS_URL: redis://localhost:6379/0
          S3_ENDPOINT: http://localhost:9000
          S3_ACCESS_KEY: test
          S3_SECRET_KEY: testtest
          S3_PUBLIC_URL: http://localhost:9000
        run: pytest -v
